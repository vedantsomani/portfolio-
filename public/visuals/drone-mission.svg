<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Drone mission replay visual</title>
  <desc id="desc">Quadcopter, waypoint grid, telemetry rows, and optical-flow warning markers.</desc>
  <rect width="1200" height="800" fill="#070a0f"/>
  <path d="M0 120H1200M0 240H1200M0 360H1200M0 480H1200M0 600H1200M0 720H1200M120 0V800M240 0V800M360 0V800M480 0V800M600 0V800M720 0V800M840 0V800M960 0V800M1080 0V800" stroke="#192334" stroke-width="1"/>
  <rect x="70" y="70" width="1060" height="660" rx="12" fill="#0e1116" stroke="#243041" stroke-width="2"/>
  <path d="M150 560C260 445 350 505 455 375C565 238 715 266 815 175C900 96 975 130 1040 98" fill="none" stroke="#f5a623" stroke-width="5" stroke-linecap="round"/>
  <path d="M150 560C260 445 350 505 455 375C565 238 715 266 815 175C900 96 975 130 1040 98" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="10 12"/>
  <g fill="#f5a623" stroke="#070a0f" stroke-width="4">
    <circle cx="150" cy="560" r="15"/>
    <circle cx="455" cy="375" r="15"/>
    <circle cx="815" cy="175" r="15"/>
    <circle cx="1040" cy="98" r="15"/>
  </g>
  <g transform="translate(470 285)">
    <circle cx="130" cy="105" r="52" fill="#141922" stroke="#f5a623" stroke-width="4"/>
    <rect x="101" y="76" width="58" height="58" rx="9" fill="#f5a623"/>
    <path d="M130 74V25M130 185V136M101 105H50M210 105H159" stroke="#f5a623" stroke-width="12" stroke-linecap="round"/>
    <circle cx="50" cy="105" r="35" fill="none" stroke="#60a5fa" stroke-width="8"/>
    <circle cx="210" cy="105" r="35" fill="none" stroke="#60a5fa" stroke-width="8"/>
    <circle cx="130" cy="25" r="35" fill="none" stroke="#60a5fa" stroke-width="8"/>
    <circle cx="130" cy="185" r="35" fill="none" stroke="#60a5fa" stroke-width="8"/>
  </g>
  <rect x="120" y="105" width="285" height="145" rx="8" fill="#111821" stroke="#2c3b50"/>
  <text x="145" y="145" fill="#f5f7fa" font-family="ui-monospace, monospace" font-size="27" font-weight="700">MISSION REPLAY</text>
  <text x="145" y="185" fill="#aab4c3" font-family="ui-monospace, monospace" font-size="18">MODE: GUIDED TEST</text>
  <text x="145" y="218" fill="#facc15" font-family="ui-monospace, monospace" font-size="18">WARN: OPTFLOW HEALTH</text>
  <rect x="780" y="520" width="300" height="150" rx="8" fill="#111821" stroke="#2c3b50"/>
  <g fill="#aab4c3" font-family="ui-monospace, monospace" font-size="18">
    <text x="810" y="565">EKF CHECK</text>
    <text x="810" y="605">LOG MARKER</text>
    <text x="810" y="645">ABORT STATE</text>
  </g>
  <g fill="#f5f7fa" font-family="ui-monospace, monospace" font-size="18" text-anchor="end">
    <text x="1045" y="565">PASS</text>
    <text x="1045" y="605">23</text>
    <text x="1045" y="645">CAPTURED</text>
  </g>
  <path d="M820 462h210" stroke="#243041" stroke-width="8" stroke-linecap="round"/>
  <path d="M820 462h95" stroke="#facc15" stroke-width="8" stroke-linecap="round"/>
</svg>
