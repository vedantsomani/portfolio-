<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">ESP32 live node visual</title>
  <desc id="desc">ESP32 board, telemetry values, radio strength, and cached status state.</desc>
  <rect width="1200" height="800" fill="#070a0f"/>
  <rect x="70" y="70" width="1060" height="660" rx="12" fill="#0e1116" stroke="#243041" stroke-width="2"/>
  <g transform="translate(410 170)">
    <rect x="0" y="0" width="380" height="460" rx="22" fill="#102017" stroke="#22c55e" stroke-width="5"/>
    <rect x="85" y="52" width="210" height="112" rx="12" fill="#141922" stroke="#60a5fa" stroke-width="3"/>
    <rect x="110" y="84" width="160" height="18" rx="4" fill="#22c55e"/>
    <rect x="110" y="119" width="120" height="18" rx="4" fill="#22d3ee"/>
    <g fill="#243041">
      <rect x="32" y="42" width="18" height="378" rx="4"/>
      <rect x="330" y="42" width="18" height="378" rx="4"/>
    </g>
    <g fill="#22c55e">
      <circle cx="41" cy="76" r="6"/>
      <circle cx="41" cy="126" r="6"/>
      <circle cx="41" cy="176" r="6"/>
      <circle cx="41" cy="226" r="6"/>
      <circle cx="41" cy="276" r="6"/>
      <circle cx="41" cy="326" r="6"/>
      <circle cx="41" cy="376" r="6"/>
      <circle cx="339" cy="76" r="6"/>
      <circle cx="339" cy="126" r="6"/>
      <circle cx="339" cy="176" r="6"/>
      <circle cx="339" cy="226" r="6"/>
      <circle cx="339" cy="276" r="6"/>
      <circle cx="339" cy="326" r="6"/>
      <circle cx="339" cy="376" r="6"/>
    </g>
    <path d="M112 240h156M112 285h156M112 330h156" stroke="#aab4c3" stroke-width="14" stroke-linecap="round"/>
    <path d="M112 240h98M112 285h132M112 330h74" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
    <text x="190" y="405" fill="#f5f7fa" font-family="ui-monospace, monospace" font-size="28" font-weight="700" text-anchor="middle">ESP32-S3-01</text>
  </g>
  <g transform="translate(110 135)" font-family="ui-monospace, monospace">
    <rect width="250" height="160" rx="8" fill="#111821" stroke="#2c3b50"/>
    <text x="28" y="42" fill="#22c55e" font-size="18" font-weight="700">NODE STATUS</text>
    <text x="28" y="82" fill="#aab4c3" font-size="17">mode: cached</text>
    <text x="28" y="114" fill="#aab4c3" font-size="17">source: static</text>
    <text x="28" y="146" fill="#aab4c3" font-size="17">api: /status</text>
  </g>
  <g transform="translate(850 160)" font-family="ui-monospace, monospace">
    <rect width="240" height="245" rx="8" fill="#111821" stroke="#2c3b50"/>
    <text x="25" y="43" fill="#f5f7fa" font-size="20" font-weight="700">TELEMETRY</text>
    <text x="25" y="88" fill="#aab4c3" font-size="17">temp</text>
    <text x="185" y="88" fill="#f5f7fa" font-size="17" text-anchor="end">22.8 C</text>
    <text x="25" y="126" fill="#aab4c3" font-size="17">humidity</text>
    <text x="185" y="126" fill="#f5f7fa" font-size="17" text-anchor="end">48%</text>
    <text x="25" y="164" fill="#aab4c3" font-size="17">voltage</text>
    <text x="185" y="164" fill="#f5f7fa" font-size="17" text-anchor="end">3.31V</text>
    <text x="25" y="202" fill="#aab4c3" font-size="17">rssi</text>
    <text x="185" y="202" fill="#f5f7fa" font-size="17" text-anchor="end">-58dBm</text>
  </g>
  <path d="M790 400C870 380 910 430 990 440" fill="none" stroke="#22c55e" stroke-width="5" stroke-dasharray="12 14"/>
  <path d="M410 420C330 420 270 360 220 295" fill="none" stroke="#60a5fa" stroke-width="5" stroke-dasharray="12 14"/>
